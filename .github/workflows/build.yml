name: Build and Push Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------- ai-service ----------------
      - name: Build and push ai-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ai-service:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ai-service:${{ github.sha }}
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service

      # ---------------- ml-pipeline-train ----------------
      - name: Build and push ml-pipeline-train
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.train
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ml-pipeline-train:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ml-pipeline-train:v3
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ml-pipeline-train:${{ github.sha }}
          cache-from: type=gha,scope=ml-pipeline-train
          cache-to: type=gha,mode=max,scope=ml-pipeline-train